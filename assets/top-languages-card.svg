<svg width="360" height="200" viewBox="0 0 360 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Top languages card</title>
  <desc id="desc">A clean top languages card highlighting TypeScript, JavaScript, Python, HTML and R with distinct colors and a rounded segmented bar chart.</desc>
  <defs>
    <linearGradient id="bg" x1="18" y1="14" x2="332" y2="188" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A" />
      <stop offset="1" stop-color="#172033" />
    </linearGradient>
    <style>
      .title {
        font: 700 22px 'Segoe UI', Arial, sans-serif;
        fill: #F8FAFC;
      }
      .label {
        font: 600 13px 'Segoe UI', Arial, sans-serif;
        fill: #CBD5E1;
      }
      .value {
        font: 700 13px 'Segoe UI', Arial, sans-serif;
        fill: #F8FAFC;
      }
    </style>
  </defs>

  <rect x="1" y="1" width="358" height="198" rx="18" fill="url(#bg)" stroke="#334155" />

  <text class="title" x="24" y="34">Top Languages</text>

  <g transform="translate(24 52)">
    <rect x="0" y="0" width="8" height="8" rx="2" fill="#3178C6" />
    <text class="label" x="18" y="8">TypeScript</text>
    <text class="value" x="286" y="8">37%</text>

    <rect x="0" y="38" width="8" height="8" rx="2" fill="#F7DF1E" />
    <text class="label" x="18" y="46">JavaScript</text>
    <text class="value" x="286" y="46">29%</text>

    <rect x="0" y="76" width="8" height="8" rx="2" fill="#2AA198" />
    <text class="label" x="18" y="84">Python</text>
    <text class="value" x="286" y="84">21%</text>

    <rect x="0" y="114" width="8" height="8" rx="2" fill="#E34F26" />
    <text class="label" x="18" y="122">HTML</text>
    <text class="value" x="294" y="122">8%</text>

    <rect x="0" y="152" width="8" height="8" rx="2" fill="#7B61FF" />
    <text class="label" x="18" y="160">R</text>
    <text class="value" x="294" y="160">5%</text>
  </g>

  <g transform="translate(24 166)">
    <rect x="0" y="0" width="312" height="14" rx="7" fill="#233047" />
    <clipPath id="barClip">
      <rect x="0" y="0" width="312" height="14" rx="7" />
    </clipPath>
    <g clip-path="url(#barClip)">
      <rect x="0" y="0" width="115" height="14" fill="#3178C6" />
      <rect x="115" y="0" width="90" height="14" fill="#F7DF1E" />
      <rect x="205" y="0" width="66" height="14" fill="#2AA198" />
      <rect x="271" y="0" width="25" height="14" fill="#E34F26" />
      <rect x="296" y="0" width="16" height="14" fill="#7B61FF" />
    </g>
  </g>
</svg>
